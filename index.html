<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, addDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

    // Firebaseの初期設定
    let db = null;
    let auth = null;
    let storage = null;
    let user = null;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'eshiritori-app-id';
    // ローカル限定モード（true の場合は Firebase 初期化・クラウド保存を行わない）
    const FORCE_LOCAL = true;

    // ひらがなリスト（お題生成用）
    const HIRAGANA_POOL = [
        'あ', 'い', 'う', 'え', 'お',
        'か', 'き', 'く', 'け', 'こ',
        'さ', 'し', 'す', 'せ', 'そ',
        'た', 'ち', 'つ', 'て', 'と',
        'な', 'に', 'ぬ', 'ね', 'の',
        'は', 'ひ', 'ふ', 'へ', 'ほ',
        'ま', 'み', 'む', 'め', 'も',
        'や', 'ゆ', 'よ',
        'ら', 'り', 'る', 'れ', 'ろ',
        'わ'
    ];

    // あいうえお表の文字データ (横向きレイアウト: 横があかさたな...、縦があいうえお...)
    const HIRAGANA_TABLES = {
        seion: [
            ['あ', 'か', 'さ', 'た', 'な', 'は', 'ま', 'や', 'ら', 'わ'],
            ['い', 'き', 'し', 'ち', 'に', 'ひ', 'み', '　', 'り', '　'],
            ['う', 'く', 'す', 'つ', 'ぬ', 'ふ', 'む', 'ゆ', 'る', 'を'],
            ['え', 'け', 'せ', 'て', 'ね', 'へ', 'め', '　', 'れ', '　'],
            ['お', 'こ', 'そ', 'と', 'の', 'ほ', 'も', 'よ', 'ろ', 'ん']
        ],
        dakuon: [
            ['が', 'ざ', 'だ', 'ば', 'ぱ'],
            ['ぎ', 'じ', 'ぢ', 'び', 'ぴ'],
            ['ぐ', 'ず', 'づ', 'ぶ', 'ぷ'],
            ['げ', 'ぜ', 'で', 'べ', 'ぺ'],
            ['ご', 'ぞ', 'ど', 'ぼ', 'ぽ']
        ],
        yoon: [
            ['ぁ', 'ぃ', 'ぅ', 'ぇ', 'ぉ'],
            ['ゃ', 'ゅ', 'ょ', 'っ', 'ー']
        ]
    };

    // ゲーム状態
    const state = {
        screen: 'top', // 'top', 'game', 'input', 'result'
        currentStep: 0, // 0 ~ 11 (合計12回)
        startChar: '', // 最初の文字
        endChar: '', // 最後の文字（12枚目の終了指定）
        drawings: [], // { image: dataUrl, name: 'ひらがな', startChar: 'あ', endChar: 'い' }
        archives: [], // 過去のゲーム履歴
        selectedArchive: null, // 詳細表示用
        isConfirmingDelete: false, // 削除確認中フラグ
        isSyncing: false, // データベース同期中のフラグ
        isConfirmingQuit: false, // 中断確認ダイアログの表示フラグ
        zoomedImage: null // 拡大表示中のオブジェクト { image: dataUrl, stepIndex: number, textLength: number, name?: string }
    };

    // モジュール外（HTMLのonclick属性等）からstateに安全にアクセスできるようグローバルに露出
    window.state = state;

    // お絵かきキャンバスの状態
    let canvas, ctx;
    let isDrawing = false;
    let drawColor = '#1e293b';
    let drawLineWidth = 6;
    let drawHistory = []; // Undo用

    // 選択中の名前入力（ひらがな）
    let currentInputName = '';

    // あいうえお表の現在のアクティブタブ
    let activeKeyboardTab = 'seion';

    // 1. ローカルキャッシュからの超高速復元を先に行う
    function initLocalCache() {
        const localData = localStorage.getItem('shiritori_archives_local');
        if (localData) {
            try {
                state.archives = JSON.parse(localData);
            } catch (e) {
                console.error("Localstorage parse error:", e);
            }
        }
    }

    // ===== ドラフト保存 / 復元 =====
    async function saveDraft(auto = false) {
        const draft = {
            savedAt: new Date().toISOString(),
            screen: state.screen,
            currentStep: state.currentStep,
            startChar: state.startChar,
            endChar: state.endChar,
            drawings: state.drawings,
            currentInputName: currentInputName
        };

        try {
            localStorage.setItem('shiritori_draft', JSON.stringify(draft));
        } catch (e) {
            console.error('Local draft save failed', e);
        }

        // クラウド保存: 自動保存(auto=true)はクラウドに画像をアップロードしない。
        if (!auto && db && user && !FORCE_LOCAL) {
            try {
                const uploaded = await uploadImagesIfNeeded(draft.drawings, `drafts/${user.uid}`);
                const toSave = { ...draft, drawings: uploaded.map(d => ({ ...d })) , uid: user.uid };
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'shiritori_drafts', user.uid);
                await setDoc(docRef, toSave);
            } catch (e) {
                console.error('Cloud draft save failed', e);
            }
        }

        if (!auto) showToast('中断用の下書きを保存しました');
    }

    function restoreDraft(draft) {
        if (!draft) return;
        state.screen = draft.screen || 'game';
        state.currentStep = typeof draft.currentStep === 'number' ? draft.currentStep : 0;
        state.startChar = draft.startChar || state.startChar;
        state.endChar = draft.endChar || state.endChar;
        state.drawings = draft.drawings || [];
        currentInputName = draft.currentInputName || '';
        draftCandidate = null;
        state.isConfirmingQuit = false;
        render();
        if (state.screen === 'game') {
            initCanvas();
        }
    }

    async function clearDraft() {
        localStorage.removeItem('shiritori_draft');
        draftCandidate = null;
        if (db && user && !FORCE_LOCAL) {
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'shiritori_drafts', user.uid);
                await deleteDoc(docRef);
            } catch (e) {
                console.error('Cloud draft delete failed', e);
            }
        }
        render();
    }

    window.resumeDraft = function() {
        if (draftCandidate) {
            restoreDraft(draftCandidate);
            showToast('下書きを復元しました');
        }
        render();
    };

    window.discardDraft = async function() {
        await clearDraft();
        showToast('下書きを削除しました');
    };

    // ===== Storage アップロード関連ユーティリティ =====
    function dataURLToBlob(dataURL) {
        const parts = dataURL.split(',');
        const meta = parts[0].match(/:(.*?);/);
        const mime = meta ? meta[1] : 'image/png';
        const bstr = atob(parts[1]);
        let n = bstr.length;
        const u8arr = new Uint8Array(n);
        while (n--) {
            u8arr[n] = bstr.charCodeAt(n);
        }
        return new Blob([u8arr], { type: mime });
    }

    function resizeDataUrl(dataUrl, maxWidth = 1200, quality = 0.8) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const ratio = Math.min(1, maxWidth / img.width);
                const canvas2 = document.createElement('canvas');
                canvas2.width = Math.round(img.width * ratio);
                canvas2.height = Math.round(img.height * ratio);
                const ctx2 = canvas2.getContext('2d');
                ctx2.fillStyle = '#ffffff';
                ctx2.fillRect(0, 0, canvas2.width, canvas2.height);
                ctx2.drawImage(img, 0, 0, canvas2.width, canvas2.height);
                resolve(canvas2.toDataURL('image/jpeg', quality));
            };
            img.onerror = () => resolve(dataUrl);
            img.src = dataUrl;
        });
    }

    // simple rate limit / abuse protection
    let lastCloudUploadTime = 0;
    let uploadCountThisHour = 0;
    let uploadHourWindowStart = Date.now();
    const MAX_UPLOADS_PER_HOUR = 500; // safety cap

    function canPerformCloudUpload() {
        const now = Date.now();
        if (now - uploadHourWindowStart > 3600 * 1000) {
            uploadHourWindowStart = now; uploadCountThisHour = 0;
        }
        if (uploadCountThisHour >= MAX_UPLOADS_PER_HOUR) return false;
        if (now - lastCloudUploadTime < 3000) return false; // 3秒以内の連続アップロードを抑制
        return true;
    }

    async function uploadSingleDataUrl(pathPrefix, index, dataUrl) {
        if (!storage) throw new Error('Storage not initialized');
        // downscale if large
        let resized = dataUrl;
        const blob0 = dataURLToBlob(dataUrl);
        if (blob0.size > 1024 * 1024 * 3) { // >3MB
            resized = await resizeDataUrl(dataUrl, 1200, 0.7);
        }
        const blob = dataURLToBlob(resized);
        const filename = `${pathPrefix}/${index}.jpg`;
        const sRef = storageRef(storage, filename);
        await uploadBytes(sRef, blob, { contentType: blob.type });
        const url = await getDownloadURL(sRef);
        lastCloudUploadTime = Date.now();
        uploadCountThisHour++;
        return url;
    }

    async function uploadImagesIfNeeded(drawings, pathPrefix) {
        if (typeof FORCE_LOCAL !== 'undefined' && FORCE_LOCAL) {
            // ローカル専用モードではクラウドにアップしない（dataURL はローカル保存のまま）
            return drawings.map(d => ({ ...d }));
        }
        if (!drawings || drawings.length === 0) return drawings;
        if (!canPerformCloudUpload()) {
            console.warn('Cloud upload suppressed by rate limiter');
            return drawings.map(d => ({ ...d, image: d.image && d.image.startsWith('data:') ? null : d.image }));
        }
        const results = [];
        for (let i = 0; i < drawings.length; i++) {
            const d = drawings[i];
            if (!d || !d.image) { results.push(d); continue; }
            if (typeof d.image === 'string' && d.image.startsWith('data:')) {
                try {
                    const url = await uploadSingleDataUrl(pathPrefix, i, d.image);
                    results.push({ ...d, image: url });
                } catch (e) {
                    console.error('Image upload failed', e);
                    results.push({ ...d, image: null });
                }
            } else {
                results.push(d);
            }
        }
        return results;
    }

    function renderDraftRestoreModal() {
        const modalId = 'draft-restore-container';
        let container = document.getElementById(modalId);
        if (!container) {
            container = document.createElement('div');
            container.id = modalId;
            document.body.appendChild(container);
        }

        if (!draftCandidate) {
            container.innerHTML = '';
            return;
        }

        const d = draftCandidate;
        container.innerHTML = `
            <div class="fixed inset-0 z-50 bg-slate-950/60 backdrop-blur-sm flex items-center justify-center p-4">
                <div class="bg-white rounded-3xl p-6 shadow-2xl max-w-sm w-full text-center border-4 border-indigo-100">
                    <div class="w-12 h-12 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center mx-auto text-2xl mb-3">
                        <i class="fa-solid fa-save"></i>
                    </div>
                    <h3 class="text-lg font-black text-slate-800 mb-1">下書きがあります</h3>
                    <p class="text-xs text-slate-400 font-bold mb-4">前回中断した下書きを復元しますか？</p>
                    <div class="text-xs text-slate-400 mb-3">保存日時: ${d.savedAt}</div>
                    <div class="flex flex-col gap-2">
                        <button onclick="window.resumeDraft()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-2.5 rounded-2xl text-sm transition-all active:scale-95">下書きを復元する</button>
                        <button onclick="window.discardDraft()" class="w-full bg-rose-50 hover:bg-rose-100 text-rose-600 font-bold py-2.5 rounded-2xl text-sm transition-all">下書きを削除する</button>
                        <button onclick="(function(){draftCandidate=null;renderDraftRestoreModal();})();" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-2.5 rounded-2xl text-sm transition-all">あとで</button>
                    </div>
                </div>
            </div>
        `;
    }

    // 2. アーカイブの読み込み
    async function loadArchives() {
        if (!db || !user) {
            console.warn("Skipping DB fetch: Firebase DB or User not ready.");
            return;
        }
        
        state.isSyncing = true;
        render(); // ローディング表示に切り替え
        
        try {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'shiritori_archives');
            const querySnapshot = await getDocs(colRef);
            const fbArchives = [];
            
            querySnapshot.forEach((doc) => {
                fbArchives.push({ id: doc.id, ...doc.data() });
            });
            
            // 日付が新しい順にソート
            fbArchives.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            state.archives = fbArchives;
            // ローカルストレージを最新状態で同期
            localStorage.setItem('shiritori_archives_local', JSON.stringify(fbArchives));
        } catch (error) {
            console.error("Error fetching Firestore archives:", error);
        } finally {
            state.isSyncing = false;
            render();
        }
    }

    // 3. Firebase初期化＆ログイン認証ライフサイクル
    async function initFirebaseAndAuth() {
        if (typeof FORCE_LOCAL !== 'undefined' && FORCE_LOCAL) {
            console.log('FORCE_LOCAL is enabled — running in local-only mode. Firebase not initialized.');
            render();
            return;
        }
        try {
            if (typeof __firebase_config !== 'undefined') {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                storage = getStorage(app);
                auth = getAuth(app);
                
                onAuthStateChanged(auth, async (u) => {
                    if (u) {
                        user = u;
                        console.log("Authenticated user:", u.uid);
                        await loadArchives();
                    } else {
                        user = null;
                        render();
                    }
                });

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } else {
                console.warn("No firebase config found. Running in local-only mode.");
                render();
            }
        } catch (e) {
            console.error("Firebase Initialisation or Auth Failed:", e);
            render();
        }
    }

    window.onload = function() {
        initLocalCache(); // まず手元のキャッシュを読み込んで仮表示
        render();
        checkForDraft();
        initFirebaseAndAuth(); // その後非同期でFirebase連携を開始して最新化
    };

    // ドラフト候補（ロード時に確認用）
    let draftCandidate = null;

    function checkForDraft() {
        const d = localStorage.getItem('shiritori_draft');
        if (d) {
            try {
                draftCandidate = JSON.parse(d);
                // 自動でモーダルを開かず、トップ画面で再開ボタンを表示する
                render();
            } catch (e) {
                console.error('Draft parse error', e);
            }
        }
    }

    // アーカイブの保存
    async function saveArchiveToDB(archiveData) {
        state.archives.unshift(archiveData); // メモリに即追加してUXを高める
        localStorage.setItem('shiritori_archives_local', JSON.stringify(state.archives));
        render();

        if (db && user) {
            try {
                // 画像が dataURL の場合は Storage にアップロードして URL に差し替える
                const uploaded = await uploadImagesIfNeeded(archiveData.drawings, `archives/${user.uid}/${Date.now()}`);
                const toSave = { ...archiveData, drawings: uploaded };
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'shiritori_archives');
                await addDoc(colRef, toSave);
                await loadArchives();
            } catch (error) {
                console.error("Error saving to Firestore:", error);
            }
        }
    }

    // ひらがなの清音化・標準化（しりとり判定用）
    function normalizeChar(char) {
        if (!char) return '';
        const map = {
            'ぁ': 'あ', 'ぃ': 'い', 'ぅ': 'う', 'ぇ': 'え', 'ぉ': 'お',
            'っ': 'つ', 'ゃ': 'や', 'ゅ': 'ゆ', 'ょ': 'よ', 'ゎ': 'わ'
        };
        let normalized = map[char] || char;
        
        const dakuonMap = {
            'が': 'か', 'ぎ': 'き', 'ぐ': 'く', 'げ': 'け', 'ご': 'こ',
            'ざ': 'さ', 'じ': 'し', 'ず': 'す', 'ぜ': 'せ', 'ぞ': 'そ',
            'だ': 'た', 'ぢ': 'ち', 'づ': 'つ', 'で': 'て', 'ど': 'と',
            'ば': 'は', 'び': 'ひ', 'ぶ': 'ふ', 'べ': 'へ', 'ぼ': 'ほ',
            'ぱ': 'は', 'ぴ': 'ひ', 'ぷ': 'ふ', 'ぺ': 'へ', 'ぽ': 'ほ'
        };
        return dakuonMap[normalized] || normalized;
    }

    // しりとり判定
    function checkShiritoriResults(drawings, startChar, endChar) {
        const results = [];
        let totalSuccess = true;

        for (let i = 0; i < drawings.length; i++) {
            const current = drawings[i];
            const name = current.name || '';
            const first = name.charAt(0);
            // 末尾が長音記号『ー』の場合は直前の文字を末尾として扱う
            let last = name.charAt(name.length - 1);
            if (last === 'ー' && name.length >= 2) {
                last = name.charAt(name.length - 2);
            }

            let isOk = true;
            let reason = '';

            if (name.length === 0) {
                isOk = false;
                reason = '名前が入力されていません';
            } else {
                if (i === 0) {
                    const reqNormal = normalizeChar(startChar);
                    const gotNormal = normalizeChar(first);
                    if (reqNormal !== gotNormal) {
                        isOk = false;
                        reason = `「${startChar}」から始まっていません`;
                    }
                } else {
                    const prevName = drawings[i - 1].name || '';
                    const prevLast = prevName.charAt(prevName.length - 1);
                    const prevLastNormal = normalizeChar(prevLast);
                    const gotNormal = normalizeChar(first);
                    if (prevLastNormal !== gotNormal) {
                        isOk = false;
                        reason = `前の絵の最後「${prevLast}」に繋がっていません`;
                    }
                }

                if (last === 'ん') {
                    isOk = false;
                    reason = '「ん」で終わっています';
                }

                if (i === drawings.length - 1) {
                    const reqEndNormal = normalizeChar(endChar);
                    const gotEndNormal = normalizeChar(last);
                    if (reqEndNormal !== gotEndNormal) {
                        isOk = false;
                        reason = `最後の文字が「${endChar}」になっていません`;
                    }
                }
            }

            if (!isOk) {
                totalSuccess = false;
            }

            results.push({
                index: i,
                isOk: isOk,
                reason: reason,
                name: name,
                startChar: first,
                endChar: last
            });
        }

        return {
            isSuccess: totalSuccess,
            details: results
        };
    }

    // 新しいゲームを開始する
    function startNewGame() {
        const startIdx = Math.floor(Math.random() * HIRAGANA_POOL.length);
        let endIdx = Math.floor(Math.random() * HIRAGANA_POOL.length);
        while (startIdx === endIdx || HIRAGANA_POOL[endIdx] === 'ん') {
            endIdx = Math.floor(Math.random() * HIRAGANA_POOL.length);
        }

        state.screen = 'game';
        state.currentStep = 0;
        state.startChar = HIRAGANA_POOL[startIdx];
        state.endChar = HIRAGANA_POOL[endIdx];
        state.drawings = [];
        state.isConfirmingQuit = false;
        state.zoomedImage = null;
        
        render();
        initCanvas();
    }

    // 中断手続き
    function setConfirmQuit(val) {
        state.isConfirmingQuit = val;
        render();
    }

    function quitGameConfirmed() {
        state.screen = 'top';
        state.isConfirmingQuit = false;
        state.drawings = [];
        render();
        loadArchives();
    }

    // 拡大（ズーム）機能
    function showZoomImage(image, stepIndex, textLength, name = '') {
        state.zoomedImage = { image, stepIndex, textLength, name };
        render();
    }

    function closeZoomImage() {
        state.zoomedImage = null;
        render();
    }

    function goToInputScreen() {
        const dataUrl = canvas.toDataURL('image/jpeg', 0.6); 
        state.drawings[state.currentStep] = {
            image: dataUrl,
            name: '',
            startChar: state.currentStep === 0 ? state.startChar : drawingsStartChar(state.currentStep)
        };

        state.screen = 'input';
        currentInputName = '';
        activeKeyboardTab = 'seion';
        render();
    }

    function drawingsStartChar(step) {
        if (step === 0) return state.startChar;
        const prev = state.drawings[step - 1];
        if (prev && prev.name) {
            return prev.name.charAt(prev.name.length - 1);
        }
        return '？';
    }

    function handleNameInput(char) {
        if (currentInputName.length < 10) {
            currentInputName += char;
            render();
        }
    }

    function deleteLastChar() {
        if (currentInputName.length > 0) {
            currentInputName = currentInputName.slice(0, -1);
            render();
        }
    }

    function confirmNameInput() {
        if (currentInputName.trim() === '') {
            showToast('おなまえをにゅうりょくしてね！');
            return;
        }

        state.drawings[state.currentStep].name = currentInputName;
        try { saveDraft(true); } catch (e) { console.error(e); }

        if (state.currentStep < 11) {
            state.currentStep++;
            state.screen = 'game';
            render();
            initCanvas();
        } else {
            finishGame();
        }
    }

    function finishGame() {
        state.screen = 'result';
        
        const checkResult = checkShiritoriResults(state.drawings, state.startChar, state.endChar);
        const now = new Date();
        const dateString = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

        const newArchive = {
            createdAt: now.toISOString(),
            createdAtString: dateString,
            startChar: state.startChar,
            endChar: state.endChar,
            isSuccess: checkResult.isSuccess,
            drawings: state.drawings,
            details: checkResult.details
        };

        saveArchiveToDB(newArchive);
        render();
        startResultReveal();
    }

            state.archives = state.archives.filter(arch => arch.id !== targetId);

    function showToast(message) {

    // キャンバスお絵描きシステム
    function initCanvas() {
        canvas = document.getElementById('paint-canvas');
        if (!canvas) return;
        ctx = canvas.getContext('2d');
        
        canvas.width = 500;
        canvas.height = 500;
        
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        drawHistory = [];
        saveDrawState();

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);

        canvas.addEventListener('touchstart', startDrawingTouch, { passive: false });
        canvas.addEventListener('touchmove', drawTouch, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);
    }

    function saveDrawState() {
        if (drawHistory.length >= 20) {
            drawHistory.shift();
        }
        drawHistory.push(canvas.toDataURL());
        // 自動下書き保存（軽量フラグ）
        try { saveDraft(true); } catch (e) { console.error(e); }
    }

    function undoDraw() {
        if (drawHistory.length > 1) {
            drawHistory.pop();
            const previousState = drawHistory[drawHistory.length - 1];
            const img = new Image();
            img.src = previousState;
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
            };
        } else if (drawHistory.length === 1) {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawHistory = [];
            saveDrawState();
        }
    }

    function clearCanvas() {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        saveDrawState();
    }

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (e.clientX - rect.left) * (canvas.width / rect.width),
            y: (e.clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    function startDrawing(e) {
        isDrawing = true;
        ctx.beginPath();
        const pos = getMousePos(e);
        ctx.moveTo(pos.x, pos.y);
        ctx.strokeStyle = drawColor;
        ctx.lineWidth = drawLineWidth;
    }

    function draw(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const pos = getMousePos(e);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
    }

    function startDrawingTouch(e) {
        if (e.touches.length === 1) {
            e.preventDefault();
            isDrawing = true;
            ctx.beginPath();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
            ctx.moveTo(x, y);
            ctx.strokeStyle = drawColor;
            ctx.lineWidth = drawLineWidth;
        }
    }

    function drawTouch(e) {
        if (!isDrawing) return;
        e.preventDefault();
        if (e.touches.length === 1) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
            ctx.lineTo(x, y);
            ctx.stroke();
        }
    }

    function stopDrawing() {
        if (isDrawing) {
            isDrawing = false;
            ctx.closePath();
            saveDrawState();
        }
    }

    // フリック入力キーボード
    let keyboardMode = 'seion'; // seion / dakuon / yoon
    const pointerFlickState = {}; // pointerId -> {x,y,key}

    const FLICK_KEYMAP = {
        // 配置: 上=右の文字, 左=上の文字, 中=中心, 右=下の文字, 下=左の文字
        'あ': { center: 'あ', up: 'う', right: 'え', down: 'お', left: 'い' },
        'か': { center: 'か', up: 'く', right: 'け', down: 'こ', left: 'き' },
        'さ': { center: 'さ', up: 'す', right: 'せ', down: 'そ', left: 'し' },
        'た': { center: 'た', up: 'つ', right: 'て', down: 'と', left: 'ち' },
        'な': { center: 'な', up: 'ぬ', right: 'ね', down: 'の', left: 'に' },
        'は': { center: 'は', up: 'ふ', right: 'へ', down: 'ほ', left: 'ひ' },
        'ま': { center: 'ま', up: 'む', right: 'め', down: 'も', left: 'み' },
        'や': { center: 'や', up: 'ゆ', right: 'ょ', down: 'よ', left: 'ゃ' },
        'ら': { center: 'ら', up: 'る', right: 'れ', down: 'ろ', left: 'り' },
        'わ': { center: 'わ', up: 'ん', right: 'ー', down: 'ゎ', left: 'を' }
    };

    const DAKUON_CONV = {
        'か': 'が','き':'ぎ','く':'ぐ','け':'げ','こ':'ご',
        'さ':'ざ','し':'じ','す':'ず','せ':'ぜ','そ':'ぞ',
        'た':'だ','ち':'ぢ','つ':'づ','て':'で','と':'ど',
        'は':'ば','ひ':'び','ふ':'ぶ','へ':'べ','ほ':'ぼ'
    };

    const PAA_CONV = {
        'は':'ぱ','ひ':'ぴ','ふ':'ぷ','へ':'ぺ','ほ':'ぽ'
    };

    const YOON_CONV = {
        'あ':'ぁ','い':'ぃ','う':'ぅ','え':'ぇ','お':'ぉ',
        'や':'ゃ','ゆ':'ゅ','よ':'ょ','つ':'っ','わ':'ゎ'
    };

    function applyKeyboardMode(ch) {
        if (!ch) return ch;
        if (keyboardMode === 'dakuon') {
            return DAKUON_CONV[ch] || PAA_CONV[ch] || ch;
        }
        if (keyboardMode === 'yoon') {
            return YOON_CONV[ch] || ch;
        }
        return ch;
    }

    function getCharForFlick(baseKey, dir) {
        const map = FLICK_KEYMAP[baseKey] || { center: baseKey };
        const raw = map[dir] || map.center;
        return applyKeyboardMode(raw);
    }

    // 最後に入力した文字の濁音/半濁音/小文字を順に切替
    window.cycleLastCharVariant = function() {
        if (!currentInputName || currentInputName.length === 0) {
            showToast('まず文字を入力してください');
            return;
        }

        const last = currentInputName.charAt(currentInputName.length - 1);
        const base = normalizeChar(last);

        // 候補リストを作る（重複を除く）
        const candidates = [base];
        const daku = DAKUON_CONV[base];
        const pa = PAA_CONV[base];
        const small = YOON_CONV[base];
        if (daku && !candidates.includes(daku)) candidates.push(daku);
        if (pa && !candidates.includes(pa)) candidates.push(pa);
        if (small && !candidates.includes(small)) candidates.push(small);

        // 現在の位置を探す
        let idx = candidates.indexOf(last);
        if (idx === -1) {
            // last 文字が候補にない場合、基底から始める
            idx = 0;
        }

        const next = candidates[(idx + 1) % candidates.length];
        currentInputName = currentInputName.slice(0, -1) + next;
        render();
    };

    window.cycleKeyboardMode = function() {
        if (keyboardMode === 'seion') keyboardMode = 'dakuon';
        else if (keyboardMode === 'dakuon') keyboardMode = 'yoon';
        else keyboardMode = 'seion';
        renderKeyboard();
        showToast(`切替: ${keyboardMode}`);
    };
    window.flickPointerDown = function(e, baseKey) {
        e.preventDefault();
        const id = e.pointerId || 'mouse';
        pointerFlickState[id] = { x: e.clientX, y: e.clientY, key: baseKey };
        try { e.target.setPointerCapture && e.target.setPointerCapture(e.pointerId); } catch (err) {}
        // 初期プレビュー表示（中心文字）
        const ch = applyKeyboardMode((FLICK_KEYMAP[baseKey] && FLICK_KEYMAP[baseKey].center) || baseKey);
        showFlickPreview(e.clientX, e.clientY, ch);
    };

    window.flickPointerMove = function(e, baseKey) {
        const id = e.pointerId || 'mouse';
        const stateObj = pointerFlickState[id];
        if (!stateObj) return;
        const dx = e.clientX - stateObj.x;
        const dy = e.clientY - stateObj.y;
        const absX = Math.abs(dx), absY = Math.abs(dy);
        const TH = 20;
        let dir = 'center';
        if (Math.max(absX, absY) > TH) {
            if (absX > absY) dir = dx > 0 ? 'right' : 'left';
            else dir = dy > 0 ? 'down' : 'up';
        }
        const ch = getCharForFlick(baseKey, dir);
        // プレビューは押した場所に固定して表示
        showFlickPreview(stateObj.x, stateObj.y, ch);
    };

    window.flickPointerUp = function(e, baseKey) {
        e.preventDefault();
        const id = e.pointerId || 'mouse';
        const stateObj = pointerFlickState[id];
        if (!stateObj) return;
        const dx = e.clientX - stateObj.x;
        const dy = e.clientY - stateObj.y;
        const absX = Math.abs(dx), absY = Math.abs(dy);
        const TH = 20;
        let dir = 'center';
        if (Math.max(absX, absY) > TH) {
            if (absX > absY) dir = dx > 0 ? 'right' : 'left';
            else dir = dy > 0 ? 'down' : 'up';
        }
        const ch = getCharForFlick(baseKey, dir);
        window.handleNameInput(ch);
        delete pointerFlickState[id];
        try { e.target.releasePointerCapture && e.target.releasePointerCapture(e.pointerId); } catch (err) {}
        hideFlickPreview();
    };

    window.flickPointerCancel = function(e) {
        const id = e.pointerId || 'mouse';
        delete pointerFlickState[id];
        hideFlickPreview();
    };

    function showFlickPreview(x, y, ch) {
        let el = document.getElementById('flick-preview');
        if (!el) {
            el = document.createElement('div');
            el.id = 'flick-preview';
            el.style.position = 'fixed';
            el.style.zIndex = 9999;
            el.style.pointerEvents = 'none';
            el.style.transition = 'transform 0.08s ease, opacity 0.12s ease';
            el.style.opacity = '0';
            el.style.display = 'flex';
            el.style.alignItems = 'center';
            el.style.justifyContent = 'center';
            el.style.background = 'white';
            el.style.border = '2px solid rgba(15,23,42,0.08)';
            el.style.boxShadow = '0 6px 18px rgba(2,6,23,0.12)';
            el.style.borderRadius = '12px';
            el.style.width = '64px';
            el.style.height = '64px';
            el.style.fontSize = '28px';
            el.style.fontWeight = '800';
            el.style.color = '#0f172a';
            document.body.appendChild(el);
        }
        el.innerText = ch;
        const offsetY = 48;
        el.style.left = `${x}px`;
        el.style.top = `${y - offsetY}px`;
        el.style.transform = 'translate(-50%, -50%) scale(1)';
        el.style.opacity = '1';
    }

    function hideFlickPreview() {
        const el = document.getElementById('flick-preview');
        if (el) {
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 150);
        }
    }

    function renderKeyboard() {
        const container = document.getElementById('keyboard-container');
        if (!container) return;

        const rows = [
            ['あ','か','さ'],
            ['た','な','は'],
            ['ま','や','ら'],
            ['toggle','わ','del']
        ];

        let html = `<div class="space-y-2">`;
        for (let r = 0; r < rows.length; r++) {
            html += `<div class="flex justify-center gap-2">`;
            for (let c = 0; c < rows[r].length; c++) {
                const key = rows[r][c];
                if (key === 'toggle') {
                    // 左下: 最後の文字に対して濁音/半濁音/小文字を切替
                    html += `
                        <button onclick="window.cycleLastCharVariant()" class="flex-1 py-3 rounded-2xl bg-slate-50 border border-slate-200 text-sm font-black">
                            /゜<div class="text-xs text-slate-400">切替</div>
                        </button>`;
                } else if (key === 'del') {
                    html += `
                        <button onclick="window.deleteLastChar()" class="flex-1 py-3 rounded-2xl bg-rose-50 border border-slate-200 text-sm font-black">
                            &lt;<div class="text-xs text-slate-400">戻る</div>
                        </button>`;
                } else {
                    const display = (FLICK_KEYMAP[key] && FLICK_KEYMAP[key].center) || key;
                    html += `
                        <button onpointerdown="window.flickPointerDown(event, '${key}')" onpointermove="window.flickPointerMove(event, '${key}')" onpointerup="window.flickPointerUp(event, '${key}')" onpointercancel="window.flickPointerCancel(event)" class="flex-1 py-4 rounded-2xl bg-white border border-slate-200 text-xl font-black select-none">
                            <div class="text-lg">${display}</div>
                        </button>`;
                }
            }
            html += `</div>`;
        }
        html += `</div>`;

        container.innerHTML = html;
    }

    // 全体レンダリング
    function render() {
        const root = document.getElementById('app-root');
        if (!root) return;

        let headerHtml = '';
        if (state.screen !== 'top') {
            headerHtml = `
                <header class="bg-white border-b border-slate-100 py-3 px-4 flex justify-between items-center shadow-sm">
                    <button onclick="window.setConfirmQuit(true)" class="flex items-center gap-1.5 text-slate-400 hover:text-rose-500 font-bold text-xs md:text-sm bg-slate-50 hover:bg-rose-50 py-1.5 px-3 rounded-full border border-slate-100 transition-all">
                        <i class="fa-solid fa-circle-xmark"></i>

                <div class="bg-white rounded-3xl p-6 shadow-2xl max-w-xs w-full text-center border-4 border-yellow-200">
                    <div class="w-12 h-12 rounded-full bg-rose-50 text-rose-500 flex items-center justify-center mx-auto text-2xl mb-3">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                    </div>
                    <h3 class="text-lg font-black text-slate-800 mb-1">ゲームをやめる？</h3>
                    <p class="text-xs text-slate-400 font-bold mb-5">これまでの絵はきえてしまいます。</p>
                    <div class="flex flex-col gap-2">
                        <button onclick="window.quitGameConfirmed()" 
                            class="w-full bg-rose-500 hover:bg-rose-600 text-white font-black py-2.5 rounded-2xl text-sm transition-all active:scale-95">
                            ゲームをやめる (トップへ)
                        </button>
                        <button onclick="window.quitAndSaveConfirmed()" 
                            class="w-full bg-yellow-400 hover:bg-yellow-500 text-yellow-950 font-black py-2.5 rounded-2xl text-sm transition-all active:scale-95">
                            中断して保存する
                        </button>
                        <button onclick="window.setConfirmQuit(false)" 
                            class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-2.5 rounded-2xl text-xs transition-all">
                            お絵描きをつづける
                        </button>
                    </div>
                </div>
            </div>
        `;
    }

    window.quitAndSaveConfirmed = async function() {
        await saveDraft(false);
        state.screen = 'top';
        state.isConfirmingQuit = false;
        state.drawings = [];
        checkForDraft();
        render();
        loadArchives();
    };

    // ズームモーダル
    function renderZoomModal() {
        const modalId = 'zoom-modal-container';
        let container = document.getElementById(modalId);
        
        if (!container) {
            container = document.createElement('div');
            container.id = modalId;
            document.body.appendChild(container);
        }

        if (!state.zoomedImage) {
            container.innerHTML = '';
            return;
        }

        const z = state.zoomedImage;
        container.innerHTML = `
            <div onclick="window.closeZoomImage()" class="fixed inset-0 z-50 bg-slate-950/85 backdrop-blur-sm flex flex-col items-center justify-center p-4 cursor-pointer">
                <div onclick="event.stopPropagation()" class="bg-white rounded-3xl p-5 shadow-2xl max-w-lg w-full relative cursor-default">
                    <button onclick="window.closeZoomImage()" class="absolute -top-12 right-0 text-white hover:text-slate-300 text-3xl">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                    
                    <div class="text-center mb-3">
                        <span class="bg-indigo-100 text-indigo-700 text-xs px-3 py-1 rounded-full font-black">
                            ${z.stepIndex + 1}枚目のえ
                        </span>
                    </div>
                    
                    <div class="aspect-square w-full rounded-2xl overflow-hidden border border-slate-200 bg-white shadow-inner mb-4">
                        <img src="${z.image}" class="w-full h-full object-contain">
                    </div>

                    <div class="text-center">
                        <div class="text-xs text-slate-400 font-black mb-1">おなまえの文字数</div>
                        <div class="flex justify-center gap-1">
                            ${Array.from({ length: z.textLength }).map(() => `
                                <span class="w-5 h-5 rounded-full bg-slate-700 inline-block text-white text-xs text-center leading-5">●</span>
                            `).join('')}
                        </div>
                        <span class="text-[10px] text-slate-400 font-bold mt-1 block">(${z.textLength}もじ)</span>
                    </div>

                    <div class="mt-4 text-center">
                        <button onclick="window.closeZoomImage()" class="bg-slate-800 hover:bg-slate-700 text-white font-extrabold text-xs px-5 py-2 rounded-xl transition-all">
                            とじる
                        </button>
                    </div>
                </div>
            </div>
        `;
    }

    // アーカイブ詳細モーダル
    function renderDetailModal() {
        const modalContainerId = 'detail-modal-container';
        let container = document.getElementById(modalContainerId);
        
        if (!container) {
            container = document.createElement('div');
            container.id = modalContainerId;
            document.body.appendChild(container);
        }

        if (!state.selectedArchive) {
            container.innerHTML = '';
            return;
        }

        const arch = state.selectedArchive;
        
        // 削除確認エリアの出し分け
        let deleteAreaHtml = '';
        if (state.isConfirmingDelete) {
            deleteAreaHtml = `
                <div class="bg-rose-50 border border-rose-200 rounded-xl p-3 flex flex-col sm:flex-row items-center justify-between gap-3 animate-pulse">
                    <span class="text-xs font-black text-rose-700">⚠️ 本当にさくじょしますか？データはもどりません。</span>
                    <div class="flex gap-2">
                        <button onclick="window.deleteArchive()" class="bg-rose-600 hover:bg-rose-700 text-white font-extrabold px-4 py-1.5 rounded-lg text-xs transition-colors flex items-center gap-1">
                            <i class="fa-solid fa-trash-can"></i> けす
                        </button>
                        <button onclick="window.setConfirmDelete(false)" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-extrabold px-4 py-1.5 rounded-lg text-xs transition-colors">
                            やめる
                        </button>
                    </div>
                </div>
            `;
        } else {
            deleteAreaHtml = `
                <button onclick="window.setConfirmDelete(true)" class="text-slate-400 hover:text-rose-600 font-bold text-xs flex items-center gap-1 py-2 px-3 rounded-lg hover:bg-rose-50 transition-all">
                    <i class="fa-regular fa-trash-can"></i>
                    <span>このさくひんを消去する</span>
                </button>
            `;
        }
        
        container.innerHTML = `
            <div class="fixed inset-0 z-50 bg-slate-950/60 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto">
                <div class="bg-white rounded-3xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden transition-all transform scale-100">
                    <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                        <div>
                            <span class="text-xs font-bold text-slate-400">${arch.createdAtString}</span>
                            <h3 class="text-lg font-black text-slate-800 flex items-center gap-2">
                                <span>しりとりアーカイブ</span>
                                <span class="px-2.5 py-0.5 rounded-full text-xs font-black ${arch.isSuccess ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}">
                                    ${arch.isSuccess ? '成功' : '失敗'}
                                </span>
                            </h3>
                        </div>
                        <button onclick="window.closeArchiveDetail()" class="text-slate-400 hover:text-slate-600 text-xl p-2 rounded-full hover:bg-slate-200 transition-colors">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>

                    <div class="p-6 overflow-y-auto flex-1 bg-slate-50/50">
                        <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-wrap justify-around items-center gap-3 mb-6 text-center">
                            <div class="flex items-center gap-1 text-slate-600 font-extrabold text-sm">
                                <span>最初の文字: </span>
                                <span class="bg-indigo-50 text-indigo-700 w-7 h-7 rounded-lg flex items-center justify-center text-sm font-black border border-indigo-100">${arch.startChar}</span>
                            </div>
                            <i class="fa-solid fa-arrow-right text-slate-300"></i>
                            <div class="flex items-center gap-1 text-slate-600 font-extrabold text-sm">
                                <span>最後の指定文字: </span>
                                <span class="bg-pink-50 text-pink-700 w-7 h-7 rounded-lg flex items-center justify-center text-sm font-black border border-pink-100">${arch.endChar}</span>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                            ${arch.drawings.map((draw, index) => {
                                const detail = arch.details[index];
                                return `
                                    <div class="bg-white border rounded-2xl p-3.5 shadow-sm flex flex-col justify-between cursor-pointer hover:scale-[1.02] transition-transform"
                                        onclick="window.showZoomImage('${draw.image}', ${index}, ${draw.name.length})">
                                        <div class="flex justify-between items-center mb-2">
                                            <span class="bg-slate-100 text-slate-600 text-[10px] font-black px-2 py-0.5 rounded-full">
                                                ${index + 1}枚目
                                            </span>
                                            <span class="text-xs font-black ${detail.isOk ? 'text-emerald-500' : 'text-rose-500'}">
                                                ${detail.isOk ? '◯ オッケー' : '❌ エラー'}
                                            </span>
                                        </div>

                                        <div class="aspect-square bg-slate-50 border border-slate-100 rounded-xl overflow-hidden mb-2 relative">
                                            <img src="${draw.image}" onerror="this.src='https://placehold.co/200x200?text=NoImage'" class="w-full h-full object-cover">
                                        </div>

                                        <div class="text-center">
                                            <div class="text-base font-extrabold text-slate-800">${draw.name}</div>
                                            <div class="text-[9px] text-slate-400 font-bold mt-1 bg-slate-50 py-0.5 rounded-md flex justify-center gap-1">
                                                <span>頭:「${draw.name.charAt(0)}」</span>
                                                <span>尾:「${draw.name.charAt(draw.name.length - 1)}」</span>
                                            </div>
                                            ${!detail.isOk ? `
                                                <div class="text-[9px] text-rose-500 font-black mt-1.5 bg-rose-50 p-1 rounded border border-rose-100 leading-tight">
                                                    ${detail.reason}
                                                </div>
                                            ` : ''}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>

                    <div class="p-4 border-t border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-3 bg-slate-50">
                        <div class="w-full sm:w-auto">
                            ${deleteAreaHtml}
                        </div>
                        <button onclick="window.closeArchiveDetail()" class="w-full sm:w-auto bg-slate-700 hover:bg-slate-800 text-white font-extrabold py-2 px-6 rounded-xl text-sm transition-colors">
                            とじる
                        </button>
                    </div>
                </div>
            </div>
        `;
    }
</script>

<div id="app-root" class="flex-1 flex flex-col">
    <!-- ローディングのプレースホルダー -->
    <div class="flex-1 flex flex-col items-center justify-center p-8 text-center bg-[#fefcf0]">
        <div class="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-lg font-bold text-slate-600">しゅんびしています...</p>
    </div>
</div>

<!-- フッター -->
<footer class="bg-slate-900 text-slate-400 py-6 text-center text-xs font-bold border-t border-slate-800">
    <div class="max-w-4xl mx-auto px-4 space-y-2">
        <p class="text-slate-500">
            お絵かきしりとりギャラリー ｜ 12文字をひらめきで繋ごう！
        </p>
        <p>© 2026 E-Shiritori Challenge. All rights reserved.</p>
    </div>
</footer>

</body>
